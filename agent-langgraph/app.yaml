command: ["uv", "run", "start-app"]
# databricks apps listen by default on port 8000

env:
  - name: MLFLOW_TRACKING_URI
    value: "databricks"
  - name: MLFLOW_REGISTRY_URI
    value: "databricks-uc"
  - name: API_PROXY
    value: "http://localhost:8000/invocations"
  - name: CHAT_APP_PORT
    value: "3000"
  - name: CHAT_PROXY_TIMEOUT_SECONDS
    value: "300"
  - name: MLFLOW_EXPERIMENT_ID
    valueFrom: "experiment"
  - name: LLM_ENDPOINT_NAME
    value: "databricks-claude-sonnet-4-6"
  - name: GENIE_SPACE_ID
    value: "01f148039e131b10b43b6f97295e52e7"
  - name: CONNECTED_TABLE
    value: "slf_srvc.test_db.reporting_flight"
  - name: AGENT_LOG_LEVEL
    value: "verbose"                              # off | min | verbose
  - name: DEBUG_LOG_TABLE
    value: "slf_srvc.test_db.agent_debug_log"
  - name: DEBUG_WAREHOUSE_ID
    value: "24062e246b5e17bf"                     # SQL warehouse used for log inserts
  - name: VECTOR_SEARCH_INDEX_NAME
    value: "slf_srvc.test_db.vector_db_knowledge_index"
  - name: VECTOR_LOW_SIMILARITY_THRESHOLD
    value: "0.70"
