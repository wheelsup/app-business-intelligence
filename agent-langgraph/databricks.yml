bundle:
  name: agent_langgraph

resources:
  apps:
    agent_langgraph:
      name: "agent-langgraph"
      description: "LangGraph agent application"
      source_code_path: ./
      config:
        command: ["uv", "run", "start-app"]
        env:
          - name: MLFLOW_TRACKING_URI
            value: "databricks"
          - name: MLFLOW_REGISTRY_URI
            value: "databricks-uc"
          - name: API_PROXY
            value: "http://localhost:8000/invocations"
          - name: CHAT_APP_PORT
            value: "3000"
          - name: CHAT_PROXY_TIMEOUT_SECONDS
            value: "300"
          - name: MLFLOW_EXPERIMENT_ID
            value_from: "experiment"
          - name: LLM_ENDPOINT_NAME
            value: "databricks-claude-sonnet-4-6"
          - name: GENIE_SPACE_ID
            value: "01f148039e131b10b43b6f97295e52e7"
          - name: CONNECTED_TABLE
            value: "slf_srvc.test_db.reporting_flight"
          - name: AGENT_LOG_LEVEL
            value: "verbose"                            # off | min | verbose
          - name: DEBUG_LOG_TABLE
            value: "slf_srvc.test_db.agent_debug_log"
          - name: DEBUG_WAREHOUSE_ID
            value: "24062e246b5e17bf"                   # SQL warehouse used for log inserts
          - name: VECTOR_SEARCH_INDEX_NAME
            value: "slf_srvc.test_db.vector_db_knowledge_index"

      # Resources which this app has access to
      resources:
        - name: 'experiment'
          experiment:
            experiment_id: "2686038917152841"
            permission: 'CAN_MANAGE'
        - name: 'agent_debug_log'
          uc_securable:
            securable_full_name: 'slf_srvc.test_db.agent_debug_log'
            securable_type: 'TABLE'
            permission: 'ALL_PRIVILEGES'
        # Warehouse used by agent_logger to INSERT conversation log rows.
        # Without this grant the SP cannot execute statements against the
        # warehouse and every log insert silently fails with a permission
        # error in stdout. Keep the id here in sync with DEBUG_WAREHOUSE_ID
        # in the env block above.
        - name: 'debug_warehouse'
          sql_warehouse:
            id: '24062e246b5e17bf'
            permission: 'CAN_USE'
        # Genie space backing the query_flights_genie tool (see tools.yaml).
        # Without this grant Genie tool calls return permission errors.
        # Keep the id here in sync with GENIE_SPACE_ID in the env block above.
        - name: 'flights_genie'
          genie_space:
            space_id: '01f148039e131b10b43b6f97295e52e7'
            permission: 'CAN_RUN'
        # Vector index backing search_flights_context (see tools.yaml).
        # Vector indexes are uc_securable of type TABLE; SELECT is sufficient
        # for read-only similarity queries. Keep the full name in sync with
        # VECTOR_SEARCH_INDEX_NAME in the env block above.
        - name: 'vector_db_knowledge_index'
          uc_securable:
            securable_full_name: 'slf_srvc.test_db.vector_db_knowledge_index'
            securable_type: 'TABLE'
            permission: 'SELECT'

targets:
  dev:
    mode: development
    default: true
    # workspace:
    #   host: https://...

  prod:
    mode: production
    # workspace:
    #   host: https://...
    resources:
      apps:
        agent_langgraph:
          name: agent-langgraph
